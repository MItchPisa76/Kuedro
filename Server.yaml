version: '3'
services:
  app:
    image: nginx:latest
    container_name: Keudro
    working_dir: /usr/share/nginx/html/kuedro
    volumes:
      - /Web/Kuedro:/usr/share/nginx/html/kuedro      
    ports:
      - "32768:80"
    # IMPORTANTE: Aggiungi 'sh' prima del percorso
    command: sh genesis.sh
    restart: always